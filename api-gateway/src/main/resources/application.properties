## Actuator routes

# Inventory Actuator
spring.cloud.gateway.server.webflux.routes[5].id=inventory-service-actuator
spring.cloud.gateway.server.webflux.routes[5].uri=lb://inventory-mservices
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/actuator/inventory/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/actuator/inventory/(?<segment>.*), /actuator/${segment}

# Orders Actuator
spring.cloud.gateway.server.webflux.routes[6].id=orders-service-actuator
spring.cloud.gateway.server.webflux.routes[6].uri=lb://orders-mservices
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/actuator/orders/**
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/actuator/orders/(?<segment>.*), /actuator/${segment}

# Products Actuator
spring.cloud.gateway.server.webflux.routes[7].id=products-service-actuator
spring.cloud.gateway.server.webflux.routes[7].uri=lb://products-mservices
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/actuator/products/**
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/actuator/products/(?<segment>.*), /actuator/${segment}


#Keycloak
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8181/realms/microservices-realm

spring.security.oauth2.client.registration.keycloak.provider=keycloak
spring.security.oauth2.client.registration.keycloak.scope=openid
spring.security.oauth2.client.registration.keycloak.client-id=mservices_cient
spring.security.oauth2.client.registration.keycloak.client-secret=mtd6DpgDK0za56EXEmuUcHs1SesQwd0G
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/keycloak


# Session y TokenRelay:
#spring.cloud.gateway.default-filters[0]=SaveSession
#spring.cloud.gateway.default-filters[1]=TokenRelay
# Filters
spring.cloud.gateway.server.webflux.default-filters[0]=SaveSession
spring.cloud.gateway.server.webflux.default-filters[1]=TokenRelay

# Flags para LOGS
logging.level.root=info
logging.level.org.springframework.cloud.gateway=debug
# trace
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator=info

#Actuator
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
