services:
  # DATABASES ===============================================
  ### postgres database for inventory
  db-inventory:
    container_name: db-inventory
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ms_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ms_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - inventory_data:/var/lib/postgresql/data
  ### mysql database for orders:
  db-orders:
    container_name: db-orders
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ms_orders
      MYSQL_ROOT_PASSWORD: mysqlserver2024**
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmysqlserver2024**"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - orders_data:/var/lib/mysql
  ### postgres database for products
  db-products:
    container_name: db-products
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ms_products
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ms_products"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - products_data:/var/lib/postgresql/data

  ### postgres database for keycloak
  db-keycloak:
    container_name: db-keycloak
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - keycloak_data:/var/lib/postgresql/data
  # MICROSERVICIOS ===============================================
  products-mservices:
    container_name: products-mservices
    build:
      context: .
      dockerfile: products-mservices/Dockerfile
    restart: unless-stopped
    depends_on:
      db-products:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-products:5432/ms_products
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8086:8086"

  inventory-mservices:
    container_name: inventory-mservices
    build:
      context: .
      dockerfile: inventory-mservices/Dockerfile
    restart: unless-stopped
    depends_on:
      db-inventory:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-inventory:5432/ms_inventory
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8083:8083"

  orders-mservices:
    container_name: orders-mservices
    build:
      context: .
      dockerfile: orders-mservices/Dockerfile
    restart: unless-stopped
    depends_on:
      db-orders:
        condition: service_healthy
      inventory-mservices:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-orders:3306/ms_orders
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysqlserver2024**
      INVENTORY_SERVICE_URL: http://inventory-mservices:8083
    ports:
      - "8082:8082"
  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - products-mservices
      - inventory-mservices
      - orders-mservices
    ports:
      - "9091:9091"

  # KEYCLOAK ===============================================
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:21.0.2
    command: [ "start-dev" ]
    ports:
      - 8181:8181
    expose:
      - 8181
    depends_on:
      db-keycloak:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db-keycloak
      KC_DB_URL_DATABASE: db_keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8181

  ### Zookeeper
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  ### Kafka
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
# Volumenes para persistencia de datos:
volumes:
  inventory_data:
  orders_data:
  products_data:
  keycloak_data: