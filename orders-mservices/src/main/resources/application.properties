spring.application.name=orders-mservices
server.port=0
# 8082

# EUREKA CLIENT
eureka.client.service-url.default-zone=http://eureka:password@localhost:8761/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.instance.prefer-ip-address=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:mysql://localhost:3308/ms_orders
spring.datasource.password=mysqlserver2024**
spring.datasource.username=root

#Keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8181/realms/microservices-realm/protocol/openid-connect/certs

#Actuator
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator/orders
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

#Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.orders-mservices.register-health-indicator=true
resilience4j.circuitbreaker.instances.orders-mservices.sliding-window-size=5
resilience4j.circuitbreaker.instances.orders-mservices.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.orders-mservices.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orders-mservices.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.orders-mservices.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.orders-mservices.permitted-number-of-calls-in-half-open-state=3